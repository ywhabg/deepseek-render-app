services:
  - type: web
    name: cognizant-deepseek-analyzer
    runtime: python
    buildCommand: |
     pyenv local 3.11.0
      pip install --upgrade pip setuptools wheel
      pip install numpy==1.24.3
      pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: FLASK_SECRET_KEY
        generateValue: true
